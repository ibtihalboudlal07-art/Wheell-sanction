<!DOCTYPE html>
<html lang="fr">
<head>

<style>

}

.card{

}

p{

}

#qrcode{
    margin-top:20px;
}
</style>

<body>

<div class="card">

<h1>🎡 Scanne et tente ta chance !</h1>

<p>La roue décidera de ton destin 😈</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
new QRCode(document.getElementById("qrcode"), {
    text: "wheel.html",
    width: 200,
    height: 200
});
</script>

</html>
